# FightForge — continuous integration (lint, build, smoke tests).
# Runs on PRs and pushes to main, integration, and ci/* branches.

name: CI

on:
  push:
    branches:
      - main
      - integration
      - "ci/**"
  pull_request:
    branches:
      - main
      - integration
  workflow_dispatch:
    inputs:
      use_self_hosted:
        description: Run on self-hosted fightforge runner (must be online)
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || inputs.use_self_hosted) && fromJson('["self-hosted","Windows","fightforge"]') || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build (Vercel-style)
        env:
          FIGHTFORGE_VERCEL_BUILD: "1"
          VITE_API_BASE: https://fightforge-api.fly.dev
        run: npm run build

  backend-image:
    name: Backend (Docker build)
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || inputs.use_self_hosted) && fromJson('["self-hosted","Windows","fightforge"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: fightforge-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-unit:
    name: Smoke tests (unit)
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || inputs.use_self_hosted) && fromJson('["self-hosted","Windows","fightforge"]') || 'ubuntu-latest' }}
    needs: [frontend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unit smoke (planGenerators, youtube, etc.)
        run: npm test

  smoke-api:
    name: Smoke tests (live API)
    runs-on: ${{ (vars.USE_SELF_HOSTED == 'true' || inputs.use_self_hosted) && fromJson('["self-hosted","Windows","fightforge"]') || 'ubuntu-latest' }}
    needs: [frontend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: API smoke against production
        env:
          API_BASE: https://fightforge-api.fly.dev
        run: npm run test:api
