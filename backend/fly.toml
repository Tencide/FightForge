# FightForge API — Fly.io
# https://fly.io/docs/reference/configuration/
#
# This file intentionally has NO "primary_region" — some Windows flyctl versions
# throw "region  not found" when `fly launch` merges TOML + flags. Set region on
# the first deploy instead:  flyctl deploy --primary-region iad
#
# If "fightforge-api" is taken, change `app` and use the new name in commands.

app = "fightforge-api"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm — cold starts were ~30–40s and made login feel broken.
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
