# FightForge — iOS build on Codemagic (no Mac required).
#
# REQUIRED in Codemagic → FightForge app → Environment variables
# Create a group named "app_store_credentials" (mark secrets) with:
#   APP_STORE_CONNECT_PRIVATE_KEY  = full contents of your .p8 file
#   APP_STORE_CONNECT_KEY_IDENTIFIER = Key ID (10 chars from App Store Connect)
#   APP_STORE_CONNECT_ISSUER_ID    = Issuer ID (UUID from App Store Connect)
#
# Alternative: use integrations.app_store_connect: YOUR_KEY_NAME
# where YOUR_KEY_NAME matches Settings → Integrations exactly.

workflows:
  fightforge-ios:
    name: FightForge iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: App.xcworkspace
        XCODE_SCHEME: App
        CM_BUNDLE_ID: com.fightforge.app
      node: v20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies and sync Capacitor
        script: |
          cd frontend
          npm ci
          npm run cap:sync
      - name: CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Verify App Store Connect API credentials
        script: |
          set -e
          missing=""
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && missing="$missing APP_STORE_CONNECT_ISSUER_ID"
          [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] && missing="$missing APP_STORE_CONNECT_KEY_IDENTIFIER"
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && missing="$missing APP_STORE_CONNECT_PRIVATE_KEY"
          if [ -n "$missing" ]; then
            echo "Missing Codemagic environment variables:$missing"
            echo "Applications → FightForge → Environment variables → group app_store_credentials"
            exit 1
          fi
      - name: Fetch signing files from Apple
        script: |
          app-store-connect fetch-signing-files "$CM_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply code signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/frontend/ios/App/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
