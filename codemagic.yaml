# FightForge — iOS build on Codemagic (no Mac required).
#
# A) App Store Connect API (publishing + profile fetch in UI):
#    Settings → Team integrations → Developer Portal → key name: Codemagic
#
# B) Code signing (required once — fixes "certificate private key" error):
#    Settings → codemagic.yaml settings → Code signing identities
#    1. iOS certificates → Generate certificate → Apple Distribution → API key Codemagic
#       Reference name: fightforge_dist
#    2. iOS provisioning profiles → Fetch profiles → App Store → com.fightforge.app
#       Reference name: fightforge_appstore
#    (Profile row should show a green check on Certificate when cert exists.)

workflows:
  fightforge-ios:
    name: FightForge iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fightforge.app
      vars:
        XCODE_WORKSPACE: App.xcworkspace
        XCODE_SCHEME: App
        CM_BUNDLE_ID: com.fightforge.app
      node: v20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies and sync Capacitor
        script: |
          cd frontend
          npm ci
          npm run cap:sync
      - name: CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Set iOS build number
        script: |
          cd frontend/ios/App
          BUILD_NUM=$CM_BUILD_NUMBER
          if [ "$BUILD_NUM" -lt 2 ]; then BUILD_NUM=2; fi
          /usr/bin/sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUM};/g" App.xcodeproj/project.pbxproj
      - name: Build IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/frontend/ios/App/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
