# FightForge — iOS build on Codemagic (no Mac required).
#
# ONE-TIME SETUP (no environment variable groups needed):
# 1. Codemagic → Settings (Personal Account) → Team integrations
# 2. Under "Developer Portal" (or App Store Connect) → Manage keys → Add key
# 3. Name must match integrations.app_store_connect below (yours: Codemagic)
# 4. Paste Issuer ID, Key ID, and upload your .p8 file → Save
# 5. Start build on main

workflows:
  fightforge-ios:
    name: FightForge iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: App.xcworkspace
        XCODE_SCHEME: App
        CM_BUNDLE_ID: com.fightforge.app
      node: v20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies and sync Capacitor
        script: |
          cd frontend
          npm ci
          npm run cap:sync
      - name: CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Fetch signing files from Apple
        script: |
          app-store-connect fetch-signing-files "$CM_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply code signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/frontend/ios/App/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
